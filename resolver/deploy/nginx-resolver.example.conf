# Nginx: TLS + reverse proxy to Node (Tech Spec v0.5 §9 — HTTPS, HSTS).
# Copy to e.g. `/etc/nginx/sites-available/resolver.humanity.llc.conf` and enable the site.
# Replace certificate paths after `certbot --nginx -d resolver.humanity.llc` (§11.1).

upstream humanity_resolver {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name resolver.humanity.llc;

    ssl_certificate     /etc/letsencrypt/live/resolver.humanity.llc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resolver.humanity.llc/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://humanity_resolver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name resolver.humanity.llc;
    return 301 https://$host$request_uri;
}
