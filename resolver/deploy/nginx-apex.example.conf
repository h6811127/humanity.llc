# Apex: everything on https://humanity.llc (one hostname, one origin).
#
# - Marketing site: static files from v5/assets → /var/www/humanity (see README).
# - Resolver API + UI: reverse-proxied to Node on 127.0.0.1:3000.
#
# DNS: point humanity.llc (and www if used) at this host or a Cloudflare Tunnel
# that terminates here — not at a separate Pages/Worker-only hostname for the apex.
#
# Certbot: certbot --nginx -d humanity.llc -d www.humanity.llc

upstream humanity_resolver {
    server 127.0.0.1:3000;
    keepalive 16;
}

# --- Resolver (match these before the static site location /) ---

location ^~ /.well-known/hc/v0.5/ {
    proxy_pass http://humanity_resolver;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/(create|revoke|profile|offline)\.html$ {
    proxy_pass http://humanity_resolver;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/(create|revoke|app)\.js$ {
    proxy_pass http://humanity_resolver;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /style.css {
    proxy_pass http://humanity_resolver;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /manifest.json {
    proxy_pass http://humanity_resolver;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /sw.js {
    proxy_pass http://humanity_resolver;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Service-Worker-Allowed /;
}

# Optional resolver hub (marketing home stays at /). Enable if you want /resolver/.
# location ^~ /resolver/ {
#     proxy_pass http://humanity_resolver/;
#     ...
# }

# --- Marketing site (v5/assets copied to root below) ---

root /var/www/humanity;

location / {
    try_files $uri $uri/ /index.html;
}
