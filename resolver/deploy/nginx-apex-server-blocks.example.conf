# Full server blocks for apex deployment. Merge the `location` blocks from
# `nginx-apex.example.conf` into the `server { listen 443 ... }` section below.

upstream humanity_resolver {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name humanity.llc www.humanity.llc;

    ssl_certificate     /etc/letsencrypt/live/humanity.llc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/humanity.llc/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Paste all location blocks from nginx-apex.example.conf here (resolver first, then root + /).

    root /var/www/humanity;

    location ^~ /.well-known/hc/v0.5/ {
        proxy_pass http://humanity_resolver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(create|revoke|profile|offline)\.html$ {
        proxy_pass http://humanity_resolver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(create|revoke|app)\.js$ {
        proxy_pass http://humanity_resolver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /style.css {
        proxy_pass http://humanity_resolver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /manifest.json {
        proxy_pass http://humanity_resolver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sw.js {
        proxy_pass http://humanity_resolver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name humanity.llc www.humanity.llc;
    return 301 https://humanity.llc$request_uri;
}
