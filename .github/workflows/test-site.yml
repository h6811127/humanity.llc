# Site shell + trust-dot regression (Vitest helpers + Playwright).
# @see docs/STATUS_INDICATOR_STEWARD_GREEN.md (optional follow-up: CI for device-status-dot)
name: Test site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "e2e/**"
      - "worker/tests/merch-funnel*.test.ts"
      - "worker/tests/shop-*.test.ts"
      - "worker/tests/wrangler-merch-routes.test.ts"
      - "worker/scripts/verify-merch-funnel*.mjs"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/test-site.yml"
  pull_request:
    branches: [main]
    paths:
      - "site/**"
      - "e2e/**"
      - "worker/tests/merch-funnel*.test.ts"
      - "worker/tests/shop-*.test.ts"
      - "worker/tests/wrangler-merch-routes.test.ts"
      - "worker/scripts/verify-merch-funnel*.mjs"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - ".github/workflows/test-site.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run worker:test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Device shell E2E
        run: npm run device-shell:e2e
        env:
          CI: "true"
      - name: PWA install E2E (Phase 4 smoke)
        run: npm run e2e:pwa-install
        env:
          CI: "true"
      - name: Hosted steward E2E (M8)
        run: npm run e2e:steward-hosted
        env:
          CI: "true"
      - name: Merch funnel E2E
        run: npm run e2e:merch-funnel
        env:
          CI: "true"
