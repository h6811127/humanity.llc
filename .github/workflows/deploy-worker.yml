# Deploy reference resolver (scan page + API). Pages deploy is separate (CF dashboard).
name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "site/scan-pass.css"
      - "site/js/pass-flip.js"
      - "package.json"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run worker:test
      - name: Apply D1 migrations
        run: printf "y\n" | npm run worker:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Worker
        run: npm run worker:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Post-deploy hosted rollout verify (step 4b)
        run: npm run hosted:rollout:post-deploy-smoke -- --verify
        env:
          API_ORIGIN: https://humanity.llc
          OPERATOR_AUDIT_TOKEN: ${{ secrets.OPERATOR_AUDIT_TOKEN }}
