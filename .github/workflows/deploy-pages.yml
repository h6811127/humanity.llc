# Deploy static site (shop UI, create/created, landing). Worker deploy is separate.
name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "package.json"
      - "worker/tests/landing-*.test.ts"
      - "worker/tests/public-network-player-flow-contract.test.ts"
      - "worker/scripts/verify-landing-copy.mjs"
      - "worker/scripts/verify-public-network-player-flow-production.mjs"
      - "worker/scripts/ci-production-fetch.mjs"
      - "site/js/public-network-player-flow-contract.mjs"
      - "worker/scripts/merch-rollout-shop-pdp-smoke.mjs"
      - "worker/tests/ci-production-fetch.test.ts"
      - "docs/CLOUDFLARE_CI_SECRETS.md"
      - "e2e/landing-copy.spec.ts"
      - ".github/workflows/deploy-pages.yml"
      - "site/play/**/comprehension/**"
      - "worker/scripts/ws-object-graph-prod-walk-preflight.mjs"
      - "worker/scripts/ws-object-graph-prod-walk-preflight-core.mjs"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Landing copy contract (pre-deploy)
        run: npm run verify:landing
      - name: Player flow shell contract (pre-deploy)
        run: npm run verify:public-network-player-flow:fast
      - name: Deploy Pages
        run: npm run pages:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 6ad770a7c6336c0c13cfb2c88c2bf8da
      - name: Post-deploy landing copy verify
        run: npm run verify:landing:production
        env:
          SITE_ORIGIN: https://humanity.llc
          HC_CI_PAGES_ORIGIN: https://humanity-llc.pages.dev
          HC_CI_VERIFY_SECRET: ${{ secrets.HC_CI_VERIFY_SECRET }}
      - name: Post-deploy player flow verify
        run: npm run verify:public-network-player-flow:production
        env:
          SITE_ORIGIN: https://humanity.llc
          HC_CI_PAGES_ORIGIN: https://humanity-llc.pages.dev
          HC_CI_VERIFY_SECRET: ${{ secrets.HC_CI_VERIFY_SECRET }}
      - name: Post-deploy merch funnel verify (step 2)
        run: npm run merch-funnel:rollout:post-deploy -- --pages
        env:
          SITE_ORIGIN: https://humanity.llc
          HC_CI_PAGES_ORIGIN: https://humanity-llc.pages.dev
          HC_CI_VERIFY_SECRET: ${{ secrets.HC_CI_VERIFY_SECRET }}
      - name: Post-deploy OG-2 dual-gate walk preflight
        run: npm run ws-object-graph:prod-walk-preflight
        env:
          API_ORIGIN: https://humanity.llc
