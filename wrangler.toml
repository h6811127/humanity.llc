# Single Worker: marketing site + Humanity Commons API (Tech Spec v0.5) + D1.
# 1) npm install
# 2) npx wrangler d1 create humanity-commons  →  paste database_id below
# 3) npx wrangler d1 migrations apply humanity-commons --local
# 4) npx wrangler d1 migrations apply humanity-commons --remote
# 5) npm run deploy

name = "humanityllc"
main = "src/index.ts"
compatibility_date = "2026-05-14"
compatibility_flags = ["nodejs_compat"]

# Preview URL: https://humanityllc.<subdomain>.workers.dev
workers_dev = true

# Production hostnames for this Worker (landing + Commons UI + v0.5 API).
# Custom Domains: TLS and routing are managed by Cloudflare; no manual DNS records.
# If you prefer to attach hostnames only in the dashboard, remove these [[routes]]
# blocks so `wrangler deploy` does not replace dashboard triggers.
[[routes]]
pattern = "humanity.llc"
custom_domain = true

[[routes]]
pattern = "www.humanity.llc"
custom_domain = true

[[routes]]
pattern = "resolver.humanity.llc"
custom_domain = true

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "humanity-commons"
database_id = "REPLACE_WITH_wrangler_d1_create_output"
migrations_dir = "migrations"

[vars]
CONSTITUTION_LINK = "https://humanity.llc/constitution"
GOVERNANCE_LINK = "https://humanity.llc/governance"

[observability]
enabled = true
