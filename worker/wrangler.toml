# Humanity Commons reference resolver (hc/v1)
# Local: npm run worker:dev  →  http://127.0.0.1:8787/.well-known/hc/v1/health
#
# Production routes attach this Worker to humanity.llc for API paths.
# Static marketing site stays on Cloudflare Pages (../site).

name = "humanity-llc-resolver"
main = "src/index.ts"
compatibility_date = "2024-08-01"
account_id = "6ad770a7c6336c0c13cfb2c88c2bf8da"

# D1  -  public trust layer (M1.2). Create remote DB once:
#   npm run worker:d1:create
# Then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "humanity-resolver"
database_id = "f16391f9-613a-4506-9ad7-35d19178b8b6"
migrations_dir = "migrations"
preview_database_id = "f16391f9-613a-4506-9ad7-35d19178b8b6"

[dev]
port = 8787

[vars]
# E1 staging: set to "1" locally to exercise steward routes; production off until M4 sign-off.
HOSTED_STEWARD_ENABLED = "1"
# Tier 0 batch fulfillment (O-002): set when Shopify founding sticker SKU is live.
# TIER0_CAMPAIGN_PROFILE_ID = ""
# TIER0_SHOPIFY_VARIANT_IDS = ""
# Printify live submit (operator-only POST …/print/orders with shipping_address):
# PRINTIFY_SUBMIT_ENABLED = "0"
# PRINTIFY_API_TOKEN = ""  # wrangler secret
# PRINTIFY_SHOP_ID = ""
# TIER0_PRINTIFY_PRODUCT_ID = ""
# TIER0_PRINTIFY_VARIANT_ID = ""
# TIER0_PRINTIFY_SHIPPING_METHOD = "1"
# Tier 1 personalized fulfillment (artifact intent → print order queue):
# PERSONALIZE_HOODIE_PRINTIFY_PRODUCT_ID = ""
# PERSONALIZE_HOODIE_PRINTIFY_VARIANT_ID = ""
# PERSONALIZE_HOODIE_PRINTIFY_SHIPPING_METHOD = "1"
# Per-order artwork (PM-FR-13): blueprint + provider + placeholder for ephemeral product create
# PERSONALIZE_HOODIE_PRINTIFY_BLUEPRINT_ID = ""
# PERSONALIZE_HOODIE_PRINTIFY_PRINT_PROVIDER_ID = ""
# PERSONALIZE_HOODIE_PRINTIFY_PLACEHOLDER = "front"
# PERSONALIZE_HOODIE_PRINTIFY_IMAGE_X = "0.5"
# PERSONALIZE_HOODIE_PRINTIFY_IMAGE_Y = "0.5"
# PERSONALIZE_HOODIE_PRINTIFY_IMAGE_SCALE = "1"
# PERSONALIZE_HOODIE_PRINTIFY_IMAGE_ANGLE = "0"
# PERSONALIZE_STICKER_PRINTIFY_PRODUCT_ID = ""
# PERSONALIZE_STICKER_PRINTIFY_VARIANT_ID = ""
# PERSONALIZE_STICKER_PRINTIFY_SHIPPING_METHOD = "1"
# PERSONALIZE_STICKER_PRINTIFY_BLUEPRINT_ID = ""
# PERSONALIZE_STICKER_PRINTIFY_PRINT_PROVIDER_ID = ""
# PERSONALIZE_STICKER_PRINTIFY_PLACEHOLDER = "front"
# Printify webhook (O-003): register in Printify admin → POST …/v1/print/webhooks/printify
# PRINTIFY_WEBHOOK_SECRET = ""  # wrangler secret; must match Printify webhook secret

# Daily orphan card purge (04:00 UTC). See docs/CARD_RETENTION_AND_ORPHAN_CLEANUP.md
[triggers]
crons = ["0 4 * * *"]

[[routes]]
 pattern = "humanity.llc/.well-known/hc/v1/*"
 zone_id = "180ee38ceea795d281fb5a3bd51af533"
 [[routes]]
 pattern = "humanity.llc/c/*"
 zone_id = "180ee38ceea795d281fb5a3bd51af533"
[[routes]]
 pattern = "humanity.llc/v1/*"
 zone_id = "180ee38ceea795d281fb5a3bd51af533"
