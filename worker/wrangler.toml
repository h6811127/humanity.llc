# Humanity Commons reference resolver (hc/v1)
# Local: npm run worker:dev  →  http://127.0.0.1:8787/.well-known/hc/v1/health
#
# Production routes attach this Worker to humanity.llc for API paths.
# Static marketing site stays on Cloudflare Pages (../site).

name = "humanity-llc-resolver"
main = "src/index.ts"
compatibility_date = "2024-08-01"
account_id = "6ad770a7c6336c0c13cfb2c88c2bf8da"

# D1  -  public trust layer (M1.2). Create remote DB once:
#   npm run worker:d1:create
# Then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name =  "humanity-resolver"
database_id = "f16391f9-613a-4506-9ad7-35d19178b8b6"
migrations_dir = "migrations"
preview_database_id = "f16391f9-613a-4506-9ad7-35d19178b8b6"

[dev]
port = 8787

[vars]
# G0 signed (2026-05-27): production rollout step 4a — hosted routes on after deploy.
HOSTED_STEWARD_ENABLED = "1"
# WS-REV R1 Stripe Checkout (wrangler secret — do not commit):
# STRIPE_SECRET_KEY = "sk_test_…"
# STRIPE_WEBHOOK_SECRET = "whsec_…"
# STRIPE_PRICE_HOSTED_STEWARD_V1 = "price_…"
# STRIPE_PRICE_HOSTED_GAME_SEASON_V1 = "price_…"
# Tier 2 Web Push (RFC P2): public key in vars; private key + contact via wrangler secret.
# STEWARD_VAPID_PUBLIC_KEY = ""
# wrangler secret put STEWARD_VAPID_PRIVATE_KEY
# wrangler secret put STEWARD_VAPID_CONTACT  # optional; default mailto:push@humanity.llc
# Cedar Rapids city game (Phase A): resolver routes off until season launch.
CITY_GAME_ENABLED = "1"
# Tier 0 batch fulfillment (O-002): set when Shopify founding sticker SKU is live.
# TIER0_CAMPAIGN_PROFILE_ID = ""
# TIER0_SHOPIFY_VARIANT_IDS = ""
# TIER0_SHOPIFY_INVENTORY_VARIANT_IDS = ""  # pre-printed SKUs (Glitch hoodie) — no Printify queue
# Printify live submit (operator-only POST …/print/orders with shipping_address):
PRINTIFY_SUBMIT_ENABLED = "0"
# PRINTIFY_API_TOKEN — wrangler secret (not in toml)
PRINTIFY_SHOP_ID = "27530167"
# TIER0_PRINTIFY_PRODUCT_ID = ""
# TIER0_PRINTIFY_VARIANT_ID = ""
# TIER0_PRINTIFY_SHIPPING_METHOD = "1"
# Tier 1 personalized fulfillment (artifact intent → print order queue):
# Hoodie blank: Champion S700 — Printify catalog blueprint 528
# https://printify.com/app/products/528/champion/champion-hoodie
# Provider: Printify Choice (99) · variant: Black / M (68861) · DTG front
PERSONALIZE_HOODIE_PRINTIFY_PRODUCT_ID = "6a188280b6c0c3254b017428"
PERSONALIZE_HOODIE_PRINTIFY_VARIANT_ID = "68861"
PERSONALIZE_HOODIE_PRINTIFY_SHIPPING_METHOD = "1"
# Per-order artwork (PM-FR-13): blueprint + provider + placeholder for ephemeral product create
PERSONALIZE_HOODIE_PRINTIFY_BLUEPRINT_ID = "528"
PERSONALIZE_HOODIE_PRINTIFY_PRINT_PROVIDER_ID = "99"
PERSONALIZE_HOODIE_PRINTIFY_PLACEHOLDER = "front"
PERSONALIZE_HOODIE_PRINTIFY_IMAGE_X = "0.5"
PERSONALIZE_HOODIE_PRINTIFY_IMAGE_Y = "0.5"
PERSONALIZE_HOODIE_PRINTIFY_IMAGE_SCALE = "0.35"
PERSONALIZE_HOODIE_PRINTIFY_IMAGE_ANGLE = "0"
# Glitch founding hoodie (glitch_hoodie_v1 / hc-glitch-hoodie-v1) — operator paste after Printify template save:
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_PRODUCT_ID = "6a18a4d17f274f4c3e04f646"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_VARIANT_ID = "68861"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_SHIPPING_METHOD = "1"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_BLUEPRINT_ID = "528"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_PRINT_PROVIDER_ID = "99"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_PLACEHOLDER = "back"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_IMAGE_X = "0.5"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_IMAGE_Y = "0.5"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_IMAGE_SCALE = "0.35"
PERSONALIZE_GLITCH_HOODIE_PRINTIFY_IMAGE_ANGLE = "0"
# PERSONALIZE_STICKER_PRINTIFY_PRODUCT_ID = ""
# PERSONALIZE_STICKER_PRINTIFY_VARIANT_ID = ""
# PERSONALIZE_STICKER_PRINTIFY_SHIPPING_METHOD = "1"
# PERSONALIZE_STICKER_PRINTIFY_BLUEPRINT_ID = ""
# PERSONALIZE_STICKER_PRINTIFY_PRINT_PROVIDER_ID = ""
# PERSONALIZE_STICKER_PRINTIFY_PLACEHOLDER = "front"
# Printify webhook (O-003): register in Printify admin → POST …/v1/print/webhooks/printify
# PRINTIFY_WEBHOOK_SECRET = ""  # wrangler secret; must match Printify webhook secret
# Encrypted shipping from Shopify paid webhook (PM-FR-41 / PM-SEC-05): 32 raw bytes, base64
# FULFILLMENT_PII_ENCRYPTION_KEY = ""  # wrangler secret; generate: openssl rand -base64 32

# Daily orphan card purge (04:00 UTC). See docs/CARD_RETENTION_AND_ORPHAN_CLEANUP.md
# Printify order reconciliation (every 30 min). See docs/V1_IMPLEMENTATION_BACKLOG.md O-003
[triggers]
crons = ["0 4 * * *", "0,30 * * * *"]

# L3 P1 — opt-in scan explainer (docs/AI_L3_EXPLAIN_SNAPSHOT.md)
[ai]
binding = "AI"

[[routes]]
pattern = "humanity.llc/.well-known/hc/v1/*"
zone_id = "180ee38ceea795d281fb5a3bd51af533"

[[routes]]
pattern = "humanity.llc/c/*"
zone_id = "180ee38ceea795d281fb5a3bd51af533"

# S6 steward vouch handoff interstitial (/v/{token})
[[routes]]
pattern = "humanity.llc/v/*"
zone_id = "180ee38ceea795d281fb5a3bd51af533"

# Commerce + print middleware (artifact intents, Shopify webhooks, Printify)
[[routes]]
pattern = "humanity.llc/v1/*"
zone_id = "180ee38ceea795d281fb5a3bd51af533"
